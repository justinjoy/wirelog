name: CI PR

# PR-specific CI workflow with 3-phase validation.
#
# Phase 1 (Lint):        lint-pr.yml — editorconfig -> uncrustify -> clang-tidy
# Phase 2 (Build):       Linux (GCC + Clang) + macOS (Clang) + Windows (MSVC), fail-fast
# Phase 3 (Sanitizers):  ASan/UBSan + TSan, runs after lint
#
# Execution order on PR: lint -> build + sanitizers
# CodeQL runs in its own workflow (GitHub default-setup); not invoked from here.

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  # ==========================================================================
  # Phase 1: Lint (import lint-pr.yml as prerequisite)
  # editorconfig -> uncrustify -> clang-tidy 22 (sequential, hard gates)
  # ==========================================================================
  lint:
    uses: ./.github/workflows/lint-pr.yml

  # ==========================================================================
  # Phase 2: Build & Test matrix
  # Depends on all lint jobs passing.
  # Linux: GCC + Clang; macOS: Clang; Windows: MSVC
  # fail-fast: true — first failure cancels remaining matrix jobs
  # Excludes: subprojects/**, build/**
  # ==========================================================================
  build:
    name: Build / ${{ matrix.os }} / ${{ matrix.compiler }}
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - GCC
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc

          # Linux - Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang

          # macOS - Clang
          - os: macos-latest
            compiler: clang
            cc: clang

          # Windows - MSVC
          - os: windows-latest
            compiler: msvc
            cc: cl

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libmbedtls-dev uncrustify
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja mbedtls uncrustify

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install meson ninja
          # pkgconfiglite ships from a SourceForge mirror without a
          # checksum; chocolatey's default policy now blocks empty
          # checksums for non-secure sources, so opt in explicitly.
          choco install pkgconfiglite uncrustify -y --allow-empty-checksums

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: meson setup builddir -Dtests=true -DmbedTLS=disabled
        env:
          CC: ${{ matrix.cc }}

      - name: Configure (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson setup builddir -Dtests=true -DmbedTLS=disabled

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: meson compile -C builddir

      - name: Build (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson compile -C builddir

      - name: Test (Linux / macOS)
        if: runner.os != 'Windows'
        run: meson test -C builddir --print-errorlogs

      - name: Test (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson test -C builddir --print-errorlogs

      # =======================================================================
      # Binary size regression gate (Issue #460)
      # Only runs on Linux GCC (reference platform for .text baseline)
      # =======================================================================
      - name: Check binary size
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: scripts/ci/check-text-size.sh builddir/libwirelog.so

      # =======================================================================
      # Path A example compile-check (Issue #462)
      # Install wirelog to a staging dir, then build the example as a
      # separate project to catch header-install regressions (#449).
      # =======================================================================
      - name: Path A example compile-check
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: |
          meson install -C builddir --destdir="$PWD/staging"
          staging_prefix="$PWD/staging/usr/local"
          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || true)"
          PKG_CONFIG_SYSROOT_DIR="$PWD/staging" \
          PKG_CONFIG_PATH="$staging_prefix/lib/${multiarch:+$multiarch/}pkgconfig:$staging_prefix/lib/pkgconfig" \
            meson setup builddir-path-a examples/path_a_pcap_skeleton
          meson compile -C builddir-path-a
          LD_LIBRARY_PATH="$staging_prefix/lib/${multiarch:+$multiarch:}$staging_prefix/lib" \
            ./builddir-path-a/pcap_skeleton

  # ==========================================================================
  # Phase 3a: ASan + UBSan matrix
  # Runs after lint and in parallel with the normal build matrix.
  # Linux: GCC + Clang; macOS: Clang
  # ==========================================================================
  sanitizer:
    name: Sanitizers / ${{ matrix.os }} / ${{ matrix.compiler }}
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - GCC
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc

          # Linux - Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang

          # macOS - Clang
          - os: macos-latest
            compiler: clang
            cc: clang

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libmbedtls-dev
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja mbedtls

      - name: Configure with sanitizers
        run: >
          meson setup builddir-san
          -Db_sanitize=address,undefined
          -Db_lundef=false
          -Dtests=true
          --buildtype=debug
        env:
          CC: ${{ matrix.cc }}

      - name: Build with sanitizers
        run: meson compile -C builddir-san

      - name: Test with sanitizers
        run: meson test -C builddir-san --print-errorlogs
        env:
          ASAN_OPTIONS: abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: abort_on_error=1:halt_on_error=1:print_stacktrace=1

  # ==========================================================================
  # Phase 3b: TSan
  # Runs after lint and in parallel with the normal build matrix.
  # TSan forces POSIX pthreads via -Dthreads=posix.
  # TSan only intercepts pthread calls; C11 <threads.h> functions
  # (thrd_create, mtx_lock) are uninstrumented and cause false SEGV.
  # ==========================================================================
  tsan:
    name: TSan / ubuntu-latest / gcc
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libmbedtls-dev

      - name: Configure with TSan
        run: |
          meson setup builddir-tsan \
            -Db_sanitize=thread \
            -Db_lundef=false \
            -Dthreads=posix \
            -Dtests=true \
            --buildtype=debug
        env:
          CC: gcc

      - name: Build with TSan
        run: meson compile -C builddir-tsan

      - name: Test with TSan
        run: meson test -C builddir-tsan --print-errorlogs
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
