<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f0f4f8; stroke: #2c3e50; stroke-width: 2; }
      .highlight { fill: #e8f4f8; stroke: #3498db; stroke-width: 2; }
      .text-title { font-size: 14px; font-weight: bold; fill: #2c3e50; text-anchor: middle; }
      .text-small { font-size: 12px; fill: #34495e; text-anchor: middle; }
      .text-desc { font-size: 11px; fill: #7f8c8d; text-anchor: middle; }
      .arrow { stroke: #2c3e50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 11px; fill: #2c3e50; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" class="text-title" style="font-size: 16px;">End-to-End Pipeline</text>

  <!-- Input -->
  <rect x="150" y="50" width="300" height="50" class="box" rx="5"/>
  <text x="300" y="80" class="text-title">.dl File</text>

  <!-- Arrow -->
  <path d="M 300 100 L 300 130" class="arrow"/>

  <!-- Parser -->
  <rect x="100" y="130" width="400" height="70" class="box" rx="5"/>
  <text x="300" y="155" class="text-title">Parser</text>
  <text x="300" y="173" class="text-desc">(C11, hand-written recursive descent)</text>
  <text x="300" y="188" class="text-small">wl_read_file()</text>

  <!-- Arrow -->
  <path d="M 300 200 L 300 230" class="arrow"/>

  <!-- Optimization Pipeline -->
  <rect x="80" y="230" width="440" height="80" class="highlight" rx="5"/>
  <text x="300" y="255" class="text-title">Optimization Passes</text>
  <text x="180" y="275" class="text-small">IR</text>
  <text x="245" y="275" class="text-small">→ Fusion</text>
  <text x="335" y="275" class="text-small">→ JPP</text>
  <text x="405" y="275" class="text-small">→ SIP</text>
  <text x="300" y="295" class="text-desc">(Logic Fusion, Join-Project Planning, Semijoin Info Passing)</text>

  <!-- Arrow -->
  <path d="M 300 310 L 300 340" class="arrow"/>

  <!-- Columnar Plan -->
  <rect x="150" y="340" width="300" height="60" class="box" rx="5"/>
  <text x="300" y="365" class="text-title">Columnar Execution Plan</text>
  <text x="300" y="388" class="text-small">(Operator IR)</text>

  <!-- Arrow -->
  <path d="M 300 400 L 300 430" class="arrow"/>

  <!-- Executor -->
  <rect x="100" y="430" width="400" height="80" class="box" rx="5"/>
  <text x="300" y="455" class="text-title">Columnar Executor</text>
  <text x="300" y="473" class="text-small">(Apache Arrow / nanoarrow)</text>
  <text x="300" y="491" class="text-desc">FILTER, PROJECT, JOIN, FLATMAP, ARRANGE</text>

  <!-- Arrow branching -->
  <path d="M 300 510 L 300 540" class="arrow"/>

  <!-- Two paths -->
  <g>
    <!-- Path label -->
    <text x="300" y="535" class="text-desc" style="font-style: italic;">Two evaluation modes:</text>
  </g>

  <!-- Left path: Baseline -->
  <g>
    <rect x="50" y="560" width="200" height="100" class="box" rx="5"/>
    <text x="150" y="585" class="text-title">Baseline Path</text>
    <text x="150" y="605" class="text-small">Full Iteration</text>
    <text x="150" y="623" class="text-desc">(iter 0..MAX)</text>
    <text x="150" y="641" class="text-desc">Evaluate all rules</text>
  </g>

  <!-- Right path: Incremental -->
  <g>
    <rect x="350" y="560" width="200" height="100" class="highlight" rx="5"/>
    <text x="450" y="585" class="text-title">Incremental Path</text>
    <text x="450" y="605" class="text-small">Delta-Seeded</text>
    <text x="450" y="623" class="text-desc">Pre-seed ∆ relations</text>
    <text x="450" y="641" class="text-desc">Selective frontier skip</text>
  </g>

  <!-- Arrows to paths -->
  <path d="M 250 540 L 150 560" class="arrow"/>
  <path d="M 350 540 L 450 560" class="arrow"/>

  <!-- Convergence arrows -->
  <path d="M 150 660 L 250 690" class="arrow"/>
  <path d="M 450 660 L 350 690" class="arrow"/>

  <!-- Result -->
  <rect x="150" y="690" width="300" height="60" class="box" rx="5"/>
  <text x="300" y="715" class="text-title">Result Callback</text>
  <text x="300" y="738" class="text-small">(Query Results / Output)</text>

  <!-- Legend -->
  <g>
    <!-- Legend background -->
    <rect x="15" y="770" width="570" height="105" fill="none" stroke="#d0d0d0" stroke-width="1" rx="3"/>

    <text x="45" y="790" class="text-small" style="font-weight: bold;">Legend:</text>

    <!-- Standard Processing (row 1) -->
    <rect x="45" y="800" width="18" height="18" class="box"/>
    <text x="68" y="813" class="text-small" style="text-anchor: start;">Standard Processing</text>

    <!-- Incremental/Optimized (row 2) -->
    <rect x="45" y="823" width="18" height="18" class="highlight"/>
    <text x="68" y="836" class="text-small" style="text-anchor: start;">Incremental/Optimized</text>

    <!-- Notes (single line) -->
    <text x="180" y="861" class="text-desc" style="font-size: 9px;">Performance: 2.55x speedup via delta-seeding and selective frontier skip</text>
  </g>
</svg>
